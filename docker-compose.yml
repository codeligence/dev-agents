services:
  dev-agents:
    image: codeligence/dev-agents:latest
    volumes:
      - ./config/config.custom.yaml:/app/config/config.custom.yaml
      - ./config/prompts.custom.yaml:/app/config/prompts.custom.yaml
      - ./data:/data
      - ./code:/code
    env_file:
      - .env
    restart: unless-stopped
