core:
  log:
    dir: "@jinja {{env.CORE_LOG_DIR or '/data/logs'}}"
  storage:
    file:
      dir: "@jinja {{env.CORE_STORAGE_FILE_DIR or '/data/storage'}}"
  version_check_url: "@jinja {{env.VERSION_CHECK_URL or ''}}"

models:
  large: "@jinja {{env.LLM_MODEL_LARGE or 'openai:gpt-4.1'}}"
  small: "@jinja {{env.LLM_MODEL_SMALL or 'openai:gpt-4.1-mini'}}"

providers:
  devops:
    url: "@jinja {{ env.get('AZURE_URL', '') }}"
    organization: "@jinja {{ env.get('AZURE_DEVOPS_ORGANIZATION', '') }}"
    project: "@jinja {{ env.get('AZURE_DEVOPS_PROJECT', '') }}"
    pat: "@jinja {{ env.get('AZURE_DEVOPS_PAT', '') }}"
    repoId: "@jinja {{ env.get('AZURE_DEVOPS_REPOID', '') }}"
    mock: "@jinja {{ env.get('AZURE_DEVOPS_MOCK', 'False') }}"
  gitlab:
    api_url: "@jinja {{ env.get('GITLAB_API_URL', '') }}"
    project_id: "@jinja {{ env.get('GITLAB_PROJECT_ID', '') }}"
    token: "@jinja {{ env.get('GITLAB_TOKEN', '') }}"
    mock: "@jinja {{ env.get('GITLAB_MOCK', 'False') }}"
  github:
    api_url: "@jinja {{ env.get('GITHUB_API_URL', '') }}"
    owner: "@jinja {{ env.get('GITHUB_OWNER', '') }}"
    repo: "@jinja {{ env.get('GITHUB_REPO', '') }}"
    token: "@jinja {{ env.get('GITHUB_TOKEN', '') }}"
    mock: "@jinja {{ env.get('GITHUB_MOCK', 'False') }}"
  jira:
    domain: "@jinja {{ env.get('JIRA_DOMAIN', '') }}"
    email: "@jinja {{ env.get('JIRA_EMAIL', '') }}"
    token: "@jinja {{ env.get('JIRA_TOKEN', '') }}"
    mock: "@jinja {{ env.get('JIRA_MOCK', 'False') }}"
    imageModel: "@jinja {{ env.get('JIRA_IMAGE_MODEL', '') }}"
  bitbucket:
    api_url: "@jinja {{ env.get('BITBUCKET_API_URL', 'https://api.bitbucket.org/2.0') }}"
    workspace: "@jinja {{ env.get('BITBUCKET_WORKSPACE', '') }}"
    repo_slug: "@jinja {{ env.get('BITBUCKET_REPO_SLUG', '') }}"
    username: "@jinja {{ env.get('BITBUCKET_EMAIL', '') }}"
    token: "@jinja {{ env.get('BITBUCKET_TOKEN', '') }}"
    mock: "@jinja {{ env.get('BITBUCKET_MOCK', 'False') }}"

projects:
  default:
    git:
      path: "@jinja {{env.GIT_REPO_PATH or '/code'}}"
      defaultBranch: "main"
      autoPull: "@jinja {{env.GIT_AUTOPULL or 'false'}}"
      pullIntervalSeconds: "@jinja {{env.GIT_PULL_INTERVAL_SECONDS or 120}}"
    pullrequests:
      devops:
        url: "@jinja {{ this.providers.devops.url }}"
        organization: "@jinja {{ this.providers.devops.organization }}"
        project: "@jinja {{ this.providers.devops.project }}"
        pat: "@jinja {{ this.providers.devops.pat }}"
        repoId: "@jinja {{ this.providers.devops.repoId }}"
        mock: "@jinja {{ this.providers.devops.mock }}"
      gitlab:
        api_url: "@jinja {{ this.providers.gitlab.api_url }}"
        project_id: "@jinja {{ this.providers.gitlab.project_id }}"
        token: "@jinja {{ this.providers.gitlab.token }}"
        mock: "@jinja {{ this.providers.gitlab.mock }}"
      github:
        api_url: "@jinja {{ this.providers.github.api_url }}"
        owner: "@jinja {{ this.providers.github.owner }}"
        repo: "@jinja {{ this.providers.github.repo }}"
        token: "@jinja {{ this.providers.github.token }}"
        mock: "@jinja {{ this.providers.github.mock }}"
      bitbucket:
        api_url: "@jinja {{ this.providers.bitbucket.api_url }}"
        workspace: "@jinja {{ this.providers.bitbucket.workspace }}"
        repo_slug: "@jinja {{ this.providers.bitbucket.repo_slug }}"
        username: "@jinja {{ this.providers.bitbucket.username }}"
        token: "@jinja {{ this.providers.bitbucket.token }}"
        mock: "@jinja {{ this.providers.bitbucket.mock }}"
    issues:
      devops:
        url: "@jinja {{ this.providers.devops.url }}"
        organization: "@jinja {{ this.providers.devops.organization }}"
        project: "@jinja {{ this.providers.devops.project }}"
        pat: "@jinja {{ this.providers.devops.pat }}"
        repoId: "@jinja {{ this.providers.devops.repoId }}"
        mock: "@jinja {{ this.providers.devops.mock }}"
      gitlab:
        api_url: "@jinja {{ this.providers.gitlab.api_url }}"
        project_id: "@jinja {{ this.providers.gitlab.project_id }}"
        token: "@jinja {{ this.providers.gitlab.token }}"
        mock: "@jinja {{ this.providers.gitlab.mock }}"
      github:
        api_url: "@jinja {{ this.providers.github.api_url }}"
        owner: "@jinja {{ this.providers.github.owner }}"
        repo: "@jinja {{ this.providers.github.repo }}"
        token: "@jinja {{ this.providers.github.token }}"
        mock: "@jinja {{ this.providers.github.mock }}"
      jira:
        domain: "@jinja {{ this.providers.jira.domain }}"
        email: "@jinja {{ this.providers.jira.email }}"
        token: "@jinja {{ this.providers.jira.token }}"
        mock: "@jinja {{ this.providers.jira.mock }}"
        imageModel: "@jinja {{ this.providers.jira.imageModel }}"
    pipelines:
      gitlab:
        api_url: "@jinja {{ this.providers.gitlab.api_url }}"
        project_id: "@jinja {{ this.providers.gitlab.project_id }}"
        token: "@jinja {{ this.providers.gitlab.token }}"
        mock: "@jinja {{ this.providers.gitlab.mock }}"

slack:
  bot:
    botToken:    "@jinja {{ env.SLACK_BOT_TOKEN or '' }}"
    appToken:    "@jinja {{ env.SLACK_APP_TOKEN or '' }}"
    processingTimeout: "@jinja {{ env.SLACK_PROCESSING_TIMEOUT or 6000 }}"
    maxConnectionFailures: "@jinja {{ env.SLACK_MAX_CONNECTION_FAILURES or 5 }}"

agui:
  server:
    host: "@jinja {{env.AGUI_HOST or '0.0.0.0'}}"
    port: "@jinja {{env.AGUI_PORT or 8000}}"
    reload: "@jinja {{env.AGUI_RELOAD or false}}"
  agent:
    defaultTimeout: "@jinja {{env.AGUI_DEFAULT_TIMEOUT or 300}}"
    defaultAgentType: "@jinja {{env.AGUI_DEFAULT_AGENT_TYPE or 'chatbot'}}"
    maxMessageLength: "@jinja {{env.AGUI_MAX_MESSAGE_LENGTH or 10000}}"

nats:
  server_url: "@jinja {{ env.get('NATS_SERVER_URL', '') }}"
  job_id: "@jinja {{ env.get('NATS_JOB_ID', '') }}"
  user: "@jinja {{ env.get('NATS_USER', '') }}"
  password: "@jinja {{ env.get('NATS_PASSWORD', '') }}"
  ca_cert_path: "@jinja {{ env.get('NATS_CA_CERT_PATH', '') }}"
  subject_job_data: "@jinja {{ env.get('NATS_SUBJECT_JOB_DATA', 'jobdata') }}"
  subject_job_updates: "@jinja {{ env.get('NATS_SUBJECT_JOB_UPDATES', 'jobupdates') }}"

cli:
  agent:
    defaultAgentType: "@jinja {{env.CLI_DEFAULT_AGENT_TYPE or 'gitchatbot'}}"

skills:
  enable: []

agents:
  gitchatbot:
    model: "@jinja {{ this.models.large }}"
    maxTokens: 2000
    temperature: 0.7
    timeoutSeconds: 60

subagents:
  coderesearch:
    model: "@jinja {{ this.models.small }}"
  claude_code:
    cli_path: "@jinja {{ env.get('CLAUDE_CODE_PATH', '') }}"
